<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist-font@latest/style.css">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
        body{
            background:#f5f5f5;
        }
    </style>
</head>
<body>
  <!-- Login page -->
   <section id="login-page" class="min-h-screen flex justify-center items-center">
      <div class="bg-white w-full max-w-md p-8 rounded-xl shadow-lg">

           <div class="flex justify-center">
                <img src="./assets/github-logo.png" class="w-20" alt="">
           </div>

           <h1 class="text-3xl font-bold text-center mt-5">GitHub Issues Tracker</h1>

           <p class="text-center text-gray-500 mt-2">Sign in to manage your issues</p>

           <!-- username -->

           <div class="mt-8">
                <label class="font-semibold">Username</label>
                <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full mt-2">
                <p class="text-sm text-gray-500 mt-1">Default: admin</p>

           </div>

           <!-- password -->

           <div class="mt-4">
                <label class="font-semibold">Password</label>
                <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full mt-2">
                <p class="text-sm text-gray-500 mt-1">Default: admin123</p>

           </div>

           <!-- login button -->
           
      </div>


   </section>

</body>
</html>
